name: homelab-services

services:
  siyuan:
    image: b3log/siyuan:v3.1.6
    container_name: "siyuan"
    user: "${USER_ID}:${GROUP_ID}"
    ports:
      - "6806:6806"
    networks:
      - homelab
    volumes:
      - "./data:${WORKSPACE}"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    command:
      - '--workspace=${WORKSPACE}/'
      - '--accessAuthCode=${AUTH_CODE}'
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"