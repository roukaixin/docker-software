services:
  mihomo:
    image: mihomo:${MIHOMO_VERSION}-${REDIRECT_PKG_HANDLER_VERSION}
    build:
      dockerfile: Dockerfile
      args:
        REDIRECT_PKG_HANDLER_VERSION: ${REDIRECT_PKG_HANDLER_VERSION}
        MIHOMO_VERSION: ${MIHOMO_VERSION}
    container_name: "mihomo"
    restart: unless-stopped
    sysctls:
      - net.ipv4.conf.lo.accept_local=1
      # - net.ipv6.conf.lo.accept_local=1
    cap_add:
      - NET_ADMIN
      - BPF
      - PERFMON
    privileged: true
    ports:
      - "17890:7890"
      - "19090:9090"
      - "1053:53"
      - "1053:53/udp"
    volumes:
      - "${LANDSCAPE_CONFIG_DIR}/unix_link/:/ld_unix_link/:ro"
      - "./data:/root/.config/mihomo"
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"
