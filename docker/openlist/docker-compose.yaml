name: homelab-services

services:
    openlist:
        image: "ghcr.io/openlistteam/openlist-git:v4.1.6-ffmpeg"
        container_name: "openlist"
        environment:
            UMASK: "${UMASK}"
            TZ: "Asia/Shanghai"
            OPENLIST_ADMIN_PASSWORD: ${OPENLIST_ADMIN_PASSWORD}
            RUN_ARIA2: false
        networks:
            - homelab
        volumes:
            - "./data:/opt/openlist/data"
        ports:
            - "5244:5244"
        restart: unless-stopped
        user: ${UID}:${GID}
        logging:
            driver: "json-file"
            options:
                max-size: "2m"
                max-file: "1"